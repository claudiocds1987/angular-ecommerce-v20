<header
  class="sticky top-0 z-50 flex items-center justify-between border-b border-white/10 bg-slate-950/80 px-3 py-3 shadow-xl backdrop-blur-md sm:px-8 sm:py-4"
>
  <button
    (click)="redirectToHomePage()"
    class="group cursor-pointer"
    aria-label="Ir a la página de inicio de Angular Ecommerce"
  >
    <div class="flex items-center gap-2 sm:gap-3">
      <img
        [src]="'./icons/angular.svg'"
        alt="Logo de Angular Ecommerce - V20"
        class="h-8 w-8 transition-transform group-hover:rotate-12 sm:h-10 sm:w-10"
      />
      <span
        class="line-clamp-1 pr-2 text-[10px] font-black tracking-wide text-white uppercase italic [word-spacing:0.3em] min-[380px]:text-xs sm:text-lg"
        >{{ title() }}</span
      >
    </div>
  </button>

  <nav
    class="actions-container flex items-center gap-1 sm:gap-2"
    aria-label="Navegation menu and actions"
  >
    @if (authStore.user()) {
      <div class="relative inline-block text-left">
        <button
          (click)="toggleMenu()"
          type="button"
          class="flex items-center gap-2 rounded-lg px-3 py-2 transition-colors hover:bg-white/5 focus:outline-none"
        >
          <span class="text-sm font-bold text-blue-400">
            {{ authStore.user()?.firstName }}
          </span>
          <span
            class="material-icons text-sm text-slate-400 transition-transform duration-200"
            [class.rotate-180]="isMenuOpen()"
          >
            expand_more
          </span>
        </button>

        @if (isMenuOpen()) {
          <div
            class="absolute right-0 z-[60] mt-2 w-48 origin-top-right rounded-xl border border-white/10 bg-slate-900 py-1 shadow-2xl"
          >
            @if (authStore.user()?.role === 'admin') {
              <button
                (click)="redirectToAdminPanel()"
                class="flex w-full items-center px-4 py-2 text-sm text-slate-300 transition-colors hover:bg-blue-500/10 hover:text-blue-400"
              >
                <span class="material-icons mr-2 text-lg">dashboard</span>
                Dashboard
              </button>
            }
            <button
              (click)="logout()"
              class="flex w-full items-center px-4 py-2 text-sm text-slate-300 transition-colors hover:bg-red-500/10 hover:text-red-400"
            >
              <span class="material-icons mr-2 text-lg">logout</span>
              Cerrar Sesión
            </button>
          </div>
        }
      </div>
    } @else {
      <button
        (click)="login()"
        class="group flex items-center gap-2 rounded-lg px-2 py-1.5 text-slate-300 transition-all hover:bg-blue-500/10 hover:text-blue-400 sm:px-3"
      >
        <span class="text-sm font-medium tracking-wide">Login</span>
      </button>
    }

    <button
      (click)="openAIAssistant()"
      class="group flex cursor-pointer items-center gap-2 rounded-lg px-2 py-1.5 text-slate-300 transition-all duration-300 hover:bg-blue-500/10 hover:text-blue-400 sm:px-3"
      aria-label="Open AI assistant"
    >
      <span class="hidden text-sm font-medium tracking-wide md:inline">AI Assistant</span>
      <span class="material-icons group-hover:animate-bounce-slow text-xl">smart_toy</span>
    </button>

    <app-primary-button
      [iconUrl]="'./icons/shopping-cart.svg'"
      (click)="redirectToCart()"
      class="inline-block scale-90 transition-transform hover:scale-105 sm:scale-100"
      aria-label="View shopping cart"
      >{{ cartService.cart().length }}</app-primary-button
    >
  </nav>
</header>

@if (spinnerService.isLoading()) {
  <div class="fixed inset-0 z-[9999] flex items-center justify-center bg-black/50 backdrop-blur-sm">
    <div class="flex flex-col items-center p-6 bg-white rounded-xl shadow-2xl">
      <div
        class="w-12 h-12 border-4 border-blue-200 border-t-blue-600 rounded-full animate-spin"
      ></div>
      <p class="mt-4 text-sm font-bold text-gray-700">Procesando archivo...</p>
      <p class="text-xs text-gray-500">Esto puede demorar unos segundos</p>
    </div>
  </div>
}

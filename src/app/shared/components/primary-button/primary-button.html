<button
  mat-flat-button
  [type]="type()"
  [disabled]="disabled()"
  [class]="'primary-button ' + variant()"
>
  <div class="flex items-center justify-center gap-2">
    @if (iconUrl()) {
      <img [src]="iconUrl()" class="animate-fade-in h-5 w-5 invert" alt="icon" />
    }
    @if (icon()) {
      <mat-icon>{{ icon() }}</mat-icon>
    }
    <span><ng-content /></span>
  </div>
</button>

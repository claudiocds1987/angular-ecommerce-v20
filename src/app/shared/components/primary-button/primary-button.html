<button
  class="primary-button"
  (click)="onClick()"
  [disabled]="disabled()"
  [class]="disabled() ? 'cursor-not-allowed opacity-50' : ''"
>
  <div class="flex items-center justify-center gap-2">
    @if (iconUrl()) {
      <img [src]="iconUrl()" class="h-5 w-5 invert" alt="icon" />
    }
    <span>{{ label() }}</span>
  </div>
</button>

<h2 mat-dialog-title class="!m-0 !text-lg !font-bold !text-slate-800">{{ data.title }}</h2>
<mat-dialog-content class="!text-sm !text-slate-600">
  <p class="m-0 leading-relaxed whitespace-pre-wrap">{{ data.message }}</p>
</mat-dialog-content>
<mat-dialog-actions align="end" class="!gap-2 !pb-4 !pt-2">
  <button mat-stroked-button type="button" (click)="cancel()">
    {{ data.cancelLabel ?? 'Cancelar' }}
  </button>
  <button
    mat-flat-button
    type="button"
    [color]="data.confirmColor ?? 'primary'"
    (click)="confirm()"
  >
    {{ data.confirmLabel ?? 'Confirmar' }}
  </button>
</mat-dialog-actions>

<div class="flex items-center">
  <input
    type="file"
    #fileInput
    (change)="onFileSelected($event)"
    accept=".xlsx, .xls, .csv"
    class="hidden"
  />

  <button
    type="button"
    (click)="fileInput.click()"
    [disabled]="loading()"
    class="group relative flex items-center gap-2 overflow-hidden rounded-lg bg-emerald-600 px-5 py-2.5 font-medium text-white shadow-md transition-all duration-300 hover:bg-emerald-700 hover:shadow-lg active:scale-95 disabled:cursor-not-allowed disabled:bg-gray-400 disabled:opacity-70"
  >
    <div
      class="absolute inset-0 -translate-x-full bg-linear-to-r from-transparent via-white/20 to-transparent transition-transform duration-500 group-hover:translate-x-full"
    ></div>

    @if (loading()) {
      <svg
        class="h-5 w-5 animate-spin text-white"
        xmlns="http://www.w3.org/2000/svg"
        fill="none"
        viewBox="0 0 24 24"
      >
        <circle
          class="opacity-25"
          cx="12"
          cy="12"
          r="10"
          stroke="currentColor"
          stroke-width="4"
        ></circle>
        <path
          class="opacity-75"
          fill="currentColor"
          d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"
        ></path>
      </svg>
      <span class="animate-pulse">Procesando...</span>
    } @else {
      <i class="fa-solid fa-file-excel text-lg transition-transform group-hover:scale-110"></i>
      <span>Importar Excel</span>
    }
  </button>
</div>

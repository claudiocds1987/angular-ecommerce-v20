<div class="w-full px-4 pt-4 md:px-8 md:pt-8">
  <app-breadcrumb [items]="breadcrumbItems()"></app-breadcrumb>
</div>
<div
  class="flex h-full items-center justify-center bg-gradient-to-br from-slate-50 via-gray-100 to-indigo-50/50 p-4"
>
  <div class="w-full max-w-md rounded-3xl border border-gray-100 bg-white p-8 shadow-lg md:p-10">
    <div class="mb-8 flex flex-col items-center">
      <div
        class="mb-4 flex h-14 w-14 items-center justify-center rounded-2xl bg-indigo-600 shadow-lg shadow-indigo-200"
      >
        <mat-icon class="text-white">lock</mat-icon>
      </div>
      <h2 class="text-center text-3xl font-black tracking-tight text-slate-800">¡Bienvenido!</h2>
      <p class="mt-1 text-sm text-slate-400">Ingresa tus credenciales para acceder</p>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="flex flex-col gap-2">
      <mat-form-field appearance="outline" class="w-full">
        <mat-label>Username</mat-label>
        <input matInput formControlName="username" type="text" placeholder="Tu usuario" />
        <mat-icon matPrefix class="mr-2 text-slate-400">person</mat-icon>

        <mat-error>
          <app-form-field-error [control]="loginForm.get('username')" />
        </mat-error>
      </mat-form-field>

      <mat-form-field appearance="outline" class="w-full">
        <mat-label>Password</mat-label>
        <input
          matInput
          formControlName="password"
          [type]="hidePassword() ? 'password' : 'text'"
          placeholder="Tu contraseña"
        />
        <mat-icon matPrefix class="mr-2 text-slate-400">lock_open</mat-icon>

        <button
          type="button"
          mat-icon-button
          matSuffix
          (click)="hidePassword.set(!hidePassword())"
          class="!text-slate-400"
        >
          <mat-icon>{{ hidePassword() ? 'visibility_off' : 'visibility' }}</mat-icon>
        </button>

        <mat-error>
          <app-form-field-error [control]="loginForm.get('password')" />
        </mat-error>
      </mat-form-field>

      @if (authStore.error()) {
        <div
          class="mb-2 flex items-center gap-2.5 rounded-xl border border-red-100 bg-red-50 px-4 py-3 text-xs font-semibold text-red-600"
        >
          <mat-icon>error_outline</mat-icon>
          <span>{{ authStore.error() }}</span>
        </div>
      }

      <app-primary-button type="submit" icon="login" [disabled]="!isReadyToLogin()" class="mt-2">
        Ingresar
      </app-primary-button>
    </form>
  </div>
</div>

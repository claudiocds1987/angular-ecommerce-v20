<div class="flex items-center justify-center min-h-screen bg-gray-100">
  <div class="p-8 bg-white shadow-lg rounded-2xl w-96">
    <h2 class="text-2xl font-bold mb-6 text-center text-gray-800">Iniciar Sesión</h2>

    <form (submit)="onSubmit($event)" class="space-y-4">
      <input
        [(ngModel)]="username"
        name="username"
        type="text"
        placeholder="Usuario"
        class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none"
      />

      <input
        [(ngModel)]="password"
        name="password"
        type="password"
        placeholder="Contraseña"
        class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none"
      />

      @if (authStore.error()) {
        <p class="text-red-500 text-sm">{{ authStore.error() }}</p>
      }

      <button
        type="submit"
        [disabled]="authStore.loading()"
        class="w-full py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors disabled:bg-gray-400"
      >
        {{ authStore.loading() ? 'Entrando...' : 'Ingresar' }}
      </button>
    </form>
  </div>
</div>

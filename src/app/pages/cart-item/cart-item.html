<div class="bg-white border border-slate-200 rounded-xl p-6 flex gap-4 items-center">
   <!--  bg-white border border-slate-200 rounded-xl p-5 sm:p-6 flex flex-col justify-between h-full relative group transition-all hover:border-slate-300 shadow-sm hover:shadow-md w-full -->
    <img [src]="item().image" alt="{{ item().title }}" class="w-[100px] h-[100px] object-contain" />

    <div class="flex flex-col gap-2 flex-1">
        <span class="text-md font-bold">{{ item().title }}</span>
        <span class="text-sm">{{ '$' + item().price }}</span>     
    </div>

    <div>
        <span>Cantidad: </span>
        <input
            #quantityInput
            type="number"
            min="1"
            [max]="item().rating.count"
            value="1"
            (change)="onQuantityChange(item().id, quantityInput.value)"
            class="w-16 border border-slate-300 rounded-md px-2 py-1"
            >
    </div>

    <div class="flex justify-end">
        <button
            class="text-black px-5 py-2 rounded-xl shadow-md cursor-pointer bg-gray-100 hover:bg-gray-200 transition-colors"
            (click)="onRemoveItem(item().id)"
        >
            Eliminar
        </button>
    </div>
</div>

<div
  class="flex items-center gap-4 rounded-2xl border border-slate-100 bg-white p-4 transition-all hover:shadow-md"
>
  <div class="h-20 w-20 flex-shrink-0 rounded-xl border border-slate-100 bg-slate-50">
    <img [src]="item().thumbnail" [alt]="item().title" class="h-full w-full object-contain p-2" />
  </div>

  <div class="flex min-w-0 flex-1 flex-col">
    <span class="truncate text-sm font-bold text-slate-900">{{ item().title }}</span>

    <div class="mt-1 flex flex-col">
      @if (item().discountPercentage! > 0) {
        <span class="text-[10px] text-slate-400 line-through">
          {{ item().price | currency }}
        </span>
        <span class="text-base font-black text-blue-600">
          {{ item().finalPrice | currency }}
        </span>
      } @else {
        <span class="text-base font-black text-slate-900">
          {{ item().price | currency }}
        </span>
      }
    </div>
  </div>

  <div class="flex flex-col items-center gap-1">
    <span class="text-[9px] font-bold tracking-wider text-slate-400 uppercase">Cantidad</span>

    <div class="flex items-center rounded-lg border border-slate-200 bg-slate-50 p-1">
      <button
        type="button"
        (click)="
          inputQuantity.value = (+inputQuantity.value - 1).toString();
          onQuantityChange(item().id, inputQuantity.value)
        "
        [disabled]="+inputQuantity.value <= 1"
        class="flex h-7 w-7 items-center justify-center rounded-md bg-white font-bold text-slate-600 shadow-sm transition-all active:scale-90 disabled:cursor-not-allowed disabled:opacity-30"
      >
        -
      </button>

      <input
        #inputQuantity
        type="number"
        min="1"
        [max]="item().stock"
        [value]="item().quantity"
        readonly
        class="w-8 cursor-default border-none bg-transparent text-center text-sm font-bold text-slate-800 focus:ring-0"
        (change)="onQuantityChange(item().id, inputQuantity.value)"
      />

      <button
        type="button"
        (click)="
          inputQuantity.value = (+inputQuantity.value + 1).toString();
          onQuantityChange(item().id, inputQuantity.value)
        "
        [disabled]="+inputQuantity.value >= item().stock"
        class="flex h-7 w-7 items-center justify-center rounded-md bg-white font-bold text-slate-600 shadow-sm transition-all active:scale-90 disabled:cursor-not-allowed disabled:opacity-30"
      >
        +
      </button>
    </div>
  </div>

  <button
    (click)="onRemoveItem(item().id)"
    class="group ml-2 cursor-pointer p-2 text-slate-300 transition-colors hover:text-red-500"
    title="Eliminar producto"
  >
    <svg
      xmlns="http://www.w3.org/2000/svg"
      class="h-5 w-5"
      fill="none"
      viewBox="0 0 24 24"
      stroke="currentColor"
    >
      <path
        stroke-linecap="round"
        stroke-linejoin="round"
        stroke-width="2"
        d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"
      />
    </svg>
  </button>
</div>

<div class="rounded-xl border border-slate-200 bg-slate-100 p-6 shadow-xl">
  <h2 class="text-2xl">Total del pedido</h2>
  <div class="flex flex-col gap-4">
    <div class="mt-2 flex gap-4">
      <span class="text-lg">Total</span>
      <span class="text-lg font-bold">{{ '$' + total() }}</span>
    </div>
    <app-primary-button label="Proceder al pago" (click)="onCheckout()" [disabled]="isDisabled()">
      Comprar
    </app-primary-button>
  </div>
</div>

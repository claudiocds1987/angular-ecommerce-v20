<div class="p-6 bg-gray-50 h-full flex flex-col overflow-hidden">
  <div class="mb-4 flex flex-col md:flex-row md:items-start md:justify-between gap-4">
    <div>
      <h1 class="text-2xl font-bold text-gray-800">Panel de Inventario (Admin)</h1>
      <p class="text-sm text-gray-500">
        Mostrando {{ productAdminStore.productsCount() }} de
        {{ productAdminStore.totalItems() }} artículos
      </p>
    </div>

    <div class="flex items-center gap-3">
      <app-excel-upload
        [endpointUrl]="apiURL"
        (uploadSuccess)="handleImportSuccess($event)"
        (uploadError)="handleImportErrors($event)"
      >
      </app-excel-upload>
    </div>
  </div>

  @if (importErrors().length > 0) {
    <div
      class="mb-4 p-4 bg-red-50 border-l-4 border-red-500 rounded-lg flex items-center justify-between shrink-0"
    >
      <h3 class="text-sm font-bold text-red-800">
        Carga fallida: {{ importErrors().length }} errores detectados.
      </h3>
      <button
        (click)="onDownloadErrors()"
        class="px-4 py-2 bg-red-600 text-white text-xs font-bold rounded-md hover:bg-red-700 transition-all"
      >
        Descargar Reporte
      </button>
    </div>
  }

  <div class="wrapper">
    <div
      class="wrapper__content-area h-full"
      [class.wrapper__content-area--filter-collapsed]="isFilterCollapsedSig()"
    >
      <div class="wrapper__grid-area h-full">
        <app-grid
          class="wrapper__grid-component"
          [gridConfigSig]="gridConfigWithTotalSig()"
          [gridDataSig]="mappedProductsSig()"
          [isLoadingSig]="productAdminStore.loading()"
          [chipsSig]="chipsSig()"
          (pageChange)="onGridPageChange($event)"
          (sortChange)="onGridSortChange($event)"
          (exportExcel)="onExportToExcel()"
          (chipRemoved)="onRemoveChip($event)"
          (searchInputValue)="onSearchInputValue($event)"
        ></app-grid>
      </div>

      <div class="wrapper__filter-container">
        <app-grid-filter
          [configSig]="gridFilterConfigSig()"
          [filterFormSig]="gridFilterFormSig()"
          [isLoadingSig]="productAdminStore.loading()"
          (emitFilterApplied)="applyFilter()"
          (isCollapsedChange)="onFilterCollapseChange($event)"
        ></app-grid-filter>
      </div>
    </div>
  </div>
</div>

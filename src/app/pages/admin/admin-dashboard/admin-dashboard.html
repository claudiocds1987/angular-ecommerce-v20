<div class="min-h-screen bg-[#f8fafc] p-4 font-sans text-slate-900 md:p-8 lg:p-12">
  <!-- Encabezado Principal -->
  <header class="mx-auto mb-10 max-w-7xl">
    <div class="flex flex-col gap-4 md:flex-row md:items-center md:justify-between">
      <div>
        <h1 class="text-3xl font-extrabold tracking-tight text-slate-900 sm:text-4xl">
          Panel de Administración
        </h1>
        <p class="mt-2 text-lg text-slate-500">
          Bienvenido de nuevo. Aquí tienes un resumen de tu catálogo.
        </p>
      </div>

      <button
        class="inline-flex items-center justify-center rounded-xl border border-transparent bg-indigo-600 px-5 py-2.5 text-sm font-semibold text-white shadow-sm transition-colors hover:bg-indigo-700"
      >
        + Nuevo Reporte
      </button>
    </div>
  </header>

  <!-- Contenedor de Secciones -->
  <!-- Importante: grid-rows-[1fr] ayuda a que las filas mantengan coherencia -->
  <main class="mx-auto grid max-w-7xl grid-cols-1 gap-8 md:grid-cols-2 lg:grid-cols-3">
    <!-- Sección: Lista de Productos -->
    <section aria-labelledby="section-products" class="h-full">
      <button
        type="button"
        (click)="goToProducts()"
        class="group relative flex h-full w-full flex-col overflow-hidden rounded-[2rem] border border-slate-200/60 bg-white p-8 text-left shadow-sm transition-all duration-500 hover:-translate-y-2 hover:shadow-2xl hover:shadow-indigo-100 focus:border-indigo-500 focus:ring-4 focus:ring-indigo-500/10 focus:outline-none"
        aria-label="Navegar a la lista de productos"
      >
        <!-- Efecto de fondo -->
        <div
          class="absolute -top-6 -right-6 h-32 w-32 rounded-full bg-gradient-to-br from-indigo-50 to-violet-50 opacity-70 transition-transform duration-700 group-hover:scale-[2]"
          aria-hidden="true"
        ></div>

        <div class="relative z-10 flex h-full flex-col">
          <div
            class="mb-8 flex h-14 w-14 items-center justify-center rounded-2xl bg-indigo-600 shadow-xl shadow-indigo-200 transition-all duration-500 group-hover:scale-110 group-hover:rotate-[10deg]"
          >
            <svg class="h-7 w-7 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="1.8"
                d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"
              />
            </svg>
          </div>

          <div class="space-y-3">
            <h2 id="section-products" class="text-2xl font-bold tracking-tight text-slate-800">
              Lista de Productos
            </h2>
            <p class="text-sm leading-relaxed text-slate-500 lg:text-base">
              Control total de tu inventario. Edita precios, gestiona el stock y optimiza tus ventas
              en tiempo real.
            </p>
          </div>

          <!-- El margen superior auto (mt-auto) empuja el pie de la card hacia abajo -->
          <div class="mt-auto">
            <div
              class="my-6 w-12 border-t border-slate-100 transition-all duration-500 group-hover:w-full"
            ></div>
            <div
              class="flex items-center text-sm font-bold tracking-wide text-indigo-600 uppercase italic"
            >
              <span>Explorar catálogo</span>
              <svg
                class="ml-2 h-5 w-5 transition-transform duration-300 group-hover:translate-x-3"
                fill="none"
                stroke="currentColor"
                viewBox="0 0 24 24"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M17 8l4 4m0 0l-4 4m4-4H3"
                />
              </svg>
            </div>
          </div>
        </div>
      </button>
    </section>

    <!-- Sección: Panel extra atributos por categoría -->
    <section aria-labelledby="section-extra-attributes" class="h-full">
      <button
        type="button"
        (click)="goToExtraAttributes()"
        class="group relative flex h-full w-full flex-col overflow-hidden rounded-[2rem] border border-slate-200/60 bg-white p-8 text-left shadow-sm transition-all duration-500 hover:-translate-y-2 hover:shadow-2xl hover:shadow-indigo-100 focus:border-indigo-500 focus:ring-4 focus:ring-indigo-500/10 focus:outline-none"
        aria-label="Navegar a atributos"
      >
        <div
          class="absolute -top-6 -right-6 h-32 w-32 rounded-full bg-gradient-to-br from-indigo-50 to-violet-50 opacity-70 transition-transform duration-700 group-hover:scale-[2]"
          aria-hidden="true"
        ></div>

        <div class="relative z-10 flex h-full flex-col">
          <div
            class="mb-8 flex h-14 w-14 items-center justify-center rounded-2xl bg-indigo-600 shadow-xl shadow-indigo-200 transition-all duration-500 group-hover:scale-110 group-hover:rotate-[10deg]"
          >
            <!-- Ícono diferente para variar -->
            <svg class="h-7 w-7 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="1.8"
                d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"
              />
            </svg>
          </div>

          <div class="space-y-3">
            <h2
              id="section-extra-attributes"
              class="text-2xl font-bold tracking-tight text-slate-800"
            >
              Atributos Extra
            </h2>
            <p class="text-sm leading-relaxed text-slate-500 lg:text-base">
              Asigna atributos extra a tus productos según su categoría de forma dinámica.
            </p>
          </div>

          <div class="mt-auto">
            <div
              class="my-6 w-12 border-t border-slate-100 transition-all duration-500 group-hover:w-full"
            ></div>
            <div
              class="flex items-center text-sm font-bold tracking-wide text-indigo-600 uppercase italic"
            >
              <span>Ir al panel</span>
              <svg
                class="ml-2 h-5 w-5 transition-transform duration-300 group-hover:translate-x-3"
                fill="none"
                stroke="currentColor"
                viewBox="0 0 24 24"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M17 8l4 4m0 0l-4 4m4-4H3"
                />
              </svg>
            </div>
          </div>
        </div>
      </button>
    </section>

    <!-- Sección: Próximamente / Analíticas -->
    <section
      class="flex h-full items-center justify-center rounded-[2rem] border-2 border-dashed border-slate-200 p-8 text-slate-400"
    >
      <p>Próximamente: Analíticas</p>
    </section>
  </main>
</div>

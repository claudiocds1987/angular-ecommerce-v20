<div class="min-h-screen bg-[#f8fafc] p-4 md:p-8 lg:p-12 font-sans text-slate-900">
  <header class="max-w-7xl mx-auto mb-10">
    <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-4">
      <div>
        <h1 class="text-3xl font-extrabold tracking-tight text-slate-900 sm:text-4xl">
          Panel de Administración
        </h1>
        <p class="mt-2 text-lg text-slate-500">
          Bienvenido de nuevo. Aquí tienes un resumen de tu catálogo.
        </p>
      </div>

      <button
        class="inline-flex items-center justify-center px-5 py-2.5 border border-transparent text-sm font-semibold rounded-xl text-white bg-indigo-600 hover:bg-indigo-700 shadow-sm transition-colors"
      >
        + Nuevo Reporte
      </button>
    </div>
  </header>

  <div class="max-w-7xl mx-auto grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
    <button
      type="button"
      (click)="goToProducts()"
      class="group relative w-full overflow-hidden bg-white p-8 rounded-[2rem] border border-slate-200/60 shadow-sm transition-all duration-500 hover:shadow-2xl hover:shadow-indigo-100 hover:-translate-y-2 text-left focus:outline-none focus:ring-4 focus:ring-indigo-500/10 focus:border-indigo-500"
      aria-label="Navegar a la lista de productos"
    >
      <div
        class="absolute -right-6 -top-6 w-32 h-32 bg-gradient-to-br from-indigo-50 to-violet-50 rounded-full transition-transform group-hover:scale-[2] duration-700 opacity-70"
        aria-hidden="true"
      ></div>

      <div class="relative z-10">
        <div
          class="w-14 h-14 bg-indigo-600 rounded-2xl flex items-center justify-center mb-8 shadow-xl shadow-indigo-200 transition-all duration-500 group-hover:scale-110 group-hover:rotate-[10deg]"
        >
          <svg
            class="w-7 h-7 text-white"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
            xmlns="http://www.w3.org/2000/svg"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="1.8"
              d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"
            ></path>
          </svg>
        </div>

        <div class="space-y-3">
          <h3 class="text-2xl font-bold text-slate-800 tracking-tight">Lista de Productos</h3>
          <p class="text-slate-500 leading-relaxed text-sm lg:text-base">
            Control total de tu inventario. Edita precios, gestiona el stock y optimiza tus ventas
            en tiempo real.
          </p>
        </div>

        <div
          class="my-6 border-t border-slate-100 w-12 transition-all duration-500 group-hover:w-full"
        ></div>

        <div
          class="flex items-center text-indigo-600 font-bold text-sm tracking-wide uppercase italic"
        >
          <span>Explorar catálogo</span>
          <svg
            class="w-5 h-5 ml-2 transition-transform duration-300 group-hover:translate-x-3"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M17 8l4 4m0 0l-4 4m4-4H3"
            />
          </svg>
        </div>
      </div>
    </button>

    <div
      class="border-2 border-dashed border-slate-200 rounded-[2rem] flex items-center justify-center p-8 text-slate-400"
    >
      Próximamente: Analíticas
    </div>
  </div>
</div>

    <div class="bg-white p-6 rounded-2xl shadow-lg border border-gray-100 mb-8">
  <form [formGroup]="filterForm" (ngSubmit)="applyFilters()" class="space-y-6">
    
    <div class="relative">
      <label for="search-input" class="sr-only">Buscar productos</label>
      <input id="search-input" type="text" formControlName="search" 
             class="w-full pl-12 pr-4 py-3 bg-gray-50 border-none rounded-xl focus:ring-2 focus:ring-indigo-500 transition-all text-gray-700"
             placeholder="Buscar por descripción o marca...">
      <span class="absolute left-4 top-3.5 text-gray-400">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
        </svg>
      </span>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
      <fieldset class="space-y-2 border-none p-0 m-0">
        <legend class="text-xs font-bold uppercase text-gray-500 tracking-wider">Rango de Precio ($)</legend>
        <div class="flex items-center space-x-2">
          <div class="relative w-full">
            <label for="min-price" class="sr-only">Precio mínimo</label>
            <input id="min-price" type="number" formControlName="minPrice" placeholder="Min" 
                   class="w-full px-3 py-2 bg-gray-50 border border-gray-200 rounded-lg focus:outline-none focus:border-indigo-500">
          </div>
          <span class="text-gray-400" aria-hidden="true">-</span>
          <div class="relative w-full">
            <label for="max-price" class="sr-only">Precio máximo</label>
            <input id="max-price" type="number" formControlName="maxPrice" placeholder="Max" 
                   class="w-full px-3 py-2 bg-gray-50 border border-gray-200 rounded-lg focus:outline-none focus:border-indigo-500">
          </div>
        </div>
      </fieldset>

      <div class="space-y-2 flex flex-col">
        <label for="category-select" class="text-xs font-bold uppercase text-gray-500 tracking-wider">Categoría</label>
        <select id="category-select" formControlName="category" 
                class="w-full px-3 py-2 bg-gray-50 border border-gray-200 rounded-lg appearance-none focus:outline-none focus:border-indigo-500 cursor-pointer">
          <option value="">Todas las categorías</option>
          <option value="beauty">Belleza</option>
          <option value="fragrances">Fragancias</option>
          <option value="furniture">Muebles</option>
        </select>
      </div>

      <div class="space-y-2 flex flex-col">
        <label for="sort-select" class="text-xs font-bold uppercase text-gray-500 tracking-wider">Ordenar por</label>
        <select id="sort-select" formControlName="sortBy" 
                class="w-full px-3 py-2 bg-gray-50 border border-gray-200 rounded-lg focus:outline-none focus:border-indigo-500 cursor-pointer">
          <option value="title">Nombre</option>
          <option value="price">Precio</option>
          <option value="rating">Calificación</option>
        </select>
      </div>
    </div>

    <div class="flex flex-col sm:flex-row justify-end gap-3 pt-4 border-t border-gray-100">
      <button type="button" (click)="clearFilters()"
              class="px-6 py-2.5 text-sm font-medium text-gray-600 hover:text-gray-800 transition-colors">
        Limpiar filtros
      </button>
      <button type="submit"
              class="px-8 py-2.5 bg-indigo-600 text-white text-sm font-semibold rounded-xl hover:bg-indigo-700 shadow-md shadow-indigo-200 transition-all active:scale-95">
        Aplicar Filtros
      </button>
    </div>
  </form>
</div>

<div
    class="bg-white border border-slate-200 rounded-xl p-5 sm:p-6 flex flex-col justify-between h-full relative group transition-all hover:border-slate-300 shadow-sm hover:shadow-md w-full"
>
    <span
        class="absolute top-3 right-3 text-[10px] sm:text-xs font-bold uppercase tracking-wide px-2 py-1 rounded-md bg-white/90 shadow-sm z-10"
        [class]="product().rating.count > 0 ? 'text-green-600' : 'text-red-500'"
    >
        @if (product().rating.count > 0) {
            En stock: {{ product().rating.count }}
        } @else {
            Sin stock
        }
    </span>

    <div class="flex items-center justify-center h-[180px] sm:h-[160px] w-full overflow-hidden">
        <img
            [src]="product().image"
            [alt]="product().title"
            class="max-w-full max-h-full object-contain group-hover:scale-105 transition-transform duration-300"
        />
    </div>

    <div class="flex flex-col flex-grow mt-4 sm:mt-6">
        <span class="text-xs font-medium text-slate-500 uppercase tracking-tight"> Producto </span>

        <span
            class="text-lg font-bold text-slate-900 leading-tight mt-1 sm:line-clamp-2 sm:min-h-[3.5rem]"
        >
            {{ product().title }}
        </span>

        <div class="mt-3 sm:mt-4">
            <span class="text-2xl font-semibold text-slate-900">
                {{ '$' + product().price }}
            </span>
        </div>
    </div>

    <div class="flex justify-center mt-6">
        <app-primary-button
            label="Agregar al carrito"
            class="w-full"
            [disabled]="product().rating.count === 0"
            (btnClicked)="addToCart(product())"
        ></app-primary-button>
    </div>
</div>
